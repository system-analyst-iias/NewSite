name: Deploy Full-Stack App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Create Production Environment File
        run: |
          cat << 'EOF' > .env
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          JWT_SECRET=${{ secrets.JWT_SECRET || 'local-dev-secret-change-me' }}
          PORT=5000
          DB_MODE=${{ secrets.DB_MODE || 'json' }}
          JSON_STORE_PATH=./server/data/users.json
          ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL || 'admin@example.com' }}
          ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD || 'admin123' }}
          EOF

      - name: Build Production Bundle
        run: npm run build

      - name: Install PM2 Globally
        run: sudo npm install -g pm2 || npm install -g pm2

      - name: Launch or Reload Server with PM2
        run: |
          pm2 startOrReload server/server.js --name iias-portal --update-env || pm2 start server/server.js --name iias-portal
          pm2 save || true
