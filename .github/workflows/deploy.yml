name: Deploy Vite App
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
        
      - run: npm ci
      
      - run: npm run build

      - run: rm -rf /var/www/html/*

      - run: cp -r dist/* /var/www/html/

